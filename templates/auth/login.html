{% extends 'base.html' %}{% block content %}
<section class="auth-card fade-up">
  <p class="eyebrow">Acceso interno</p>
  <h1>Ingresar</h1>
  <p>Accedé a tu panel de administración o liderazgo.</p>
  <form method="post" class="form smart-form" novalidate autocomplete="off">
    <label>Usuario
      <input type="text" name="username" data-label="Usuario" required placeholder="Usuario" autocomplete="off" autocapitalize="none" spellcheck="false">
    </label>
    <label>Contraseña
      <div class="password-wrap">
        <input type="password" name="password" data-label="Contraseña" required placeholder="Contraseña" autocomplete="off">
        <button class="password-toggle" type="button" aria-label="Mostrar contraseña" data-password-toggle>
          <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="2.7"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2.7 2.7 0 0012 14.7c.7 0 1.3-.3 1.8-.7"/><path d="M7.4 7.8C4.4 9.5 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.8 0 3.4-.6 4.7-1.4"/><path d="M14.1 5.8c4.5 1 7.4 6.2 7.4 6.2s-.8 1.5-2.2 3"/></svg>
        </button>
      </div>
    </label>
    <button class="btn primary full">Entrar</button>
  </form>
</section>
{% endblock %}
