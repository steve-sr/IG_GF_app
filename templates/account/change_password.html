{% extends 'base.html' %}{% block content %}
<section class="dash-head shell fade-up">
  <div>
    <p class="eyebrow">Mi cuenta</p>
    <h1>Cambiar contraseña</h1>
    <p>Actualizá tu acceso de forma segura. La contraseña no se muestra ni se guarda en texto plano.</p>
  </div>
  <button class="btn ghost" type="button" onclick="history.back()"><span class="icon arrow-left"></span>Volver</button>
</section>
<form method="post" class="form panel smart-form shell fade-up delay-1" novalidate>
  <div class="form-section">
    <div>
      <h3>Seguridad</h3>
      <p>Usá una contraseña de mínimo 8 caracteres. Evitá compartirla por mensajes o capturas.</p>
    </div>
    <div class="grid two">
      <label>Usuario<input value="{{ current_user.username }}" disabled></label>
      <label>Contraseña actual<input type="password" name="current_password" required data-label="Contraseña actual" autocomplete="current-password"></label>
      <label>Nueva contraseña<input type="password" name="new_password" required data-label="Nueva contraseña" autocomplete="new-password"></label>
      <label>Confirmar nueva contraseña<input type="password" name="confirm_password" required data-label="Confirmar contraseña" autocomplete="new-password"></label>
    </div>
  </div>
  <button class="btn primary full"><span class="icon lock"></span>Guardar nueva contraseña</button>
</form>
{% endblock %}
