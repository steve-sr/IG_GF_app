{% extends 'base.html' %}{% block content %}
<section class="dash-head shell fade-up">
  <div>
    <p class="eyebrow">Mi cuenta</p>
    <h1>Cambiar contraseña</h1>
    <p>Actualizá tu acceso de forma segura. La contraseña no se muestra ni se guarda en texto plano.</p>
  </div>
  <a class="btn ghost" href="{{ url_for('admin_dashboard') if current_user.role in ['admin','mentor'] else url_for('leader_dashboard') }}"><span class="icon arrow-left"></span>Volver</a>
</section>
<form method="post" class="form panel smart-form shell fade-up delay-1" novalidate>
  <div class="form-section">
    <div>
      <h3>Seguridad</h3>
      <p>Usá una contraseña de mínimo 8 caracteres. Evitá compartirla por mensajes o capturas.</p>
    </div>
    <div class="grid two">
      <label>Usuario<input value="{{ current_user.username }}" disabled></label>
      <label>Contraseña actual<div class="password-wrap"><input type="password" name="current_password" required data-label="Contraseña actual" autocomplete="current-password"><button class="password-toggle" type="button" aria-label="Mostrar contraseña" data-password-toggle><svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="2.7"/></svg><svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2.7 2.7 0 0012 14.7c.7 0 1.3-.3 1.8-.7"/><path d="M7.4 7.8C4.4 9.5 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.8 0 3.4-.6 4.7-1.4"/><path d="M14.1 5.8c4.5 1 7.4 6.2 7.4 6.2s-.8 1.5-2.2 3"/></svg></button></div></label>
      <label>Nueva contraseña<div class="password-wrap"><input type="password" name="new_password" required data-label="Nueva contraseña" autocomplete="new-password"><button class="password-toggle" type="button" aria-label="Mostrar contraseña" data-password-toggle><svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="2.7"/></svg><svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2.7 2.7 0 0012 14.7c.7 0 1.3-.3 1.8-.7"/><path d="M7.4 7.8C4.4 9.5 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.8 0 3.4-.6 4.7-1.4"/><path d="M14.1 5.8c4.5 1 7.4 6.2 7.4 6.2s-.8 1.5-2.2 3"/></svg></button></div></label>
      <label>Confirmar nueva contraseña<div class="password-wrap"><input type="password" name="confirm_password" required data-label="Confirmar contraseña" autocomplete="new-password"><button class="password-toggle" type="button" aria-label="Mostrar contraseña" data-password-toggle><svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/><circle cx="12" cy="12" r="2.7"/></svg><svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"/><path d="M10.6 10.6A2.7 2.7 0 0012 14.7c.7 0 1.3-.3 1.8-.7"/><path d="M7.4 7.8C4.4 9.5 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.8 0 3.4-.6 4.7-1.4"/><path d="M14.1 5.8c4.5 1 7.4 6.2 7.4 6.2s-.8 1.5-2.2 3"/></svg></button></div></label>
    </div>
  </div>
  <button class="btn primary full"><span class="icon lock"></span>Guardar nueva contraseña</button>
</form>
{% endblock %}
